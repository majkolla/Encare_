seed: 42
val_frac: 0.2
n_rows_multiplier: 1.0
output_dir: data/outputs
artifact_dir: data/artifacts
models:
  - baseline
  - copula
  - ctgan
  - hybrid

score_weights:
  marginal: 0.30
  dependency: 0.30
  discriminator: 0.20
  privacy: 0.15
  logic: 0.05

baseline:
  model: baseline
  numeric_strategy: bootstrap
  repair: false
  privacy_filter: false

copula:
  model: copula
  repair: true
  privacy_filter: true
  privacy_min_distance: 0.0

ctgan:
  model: ctgan
  epochs: 100
  batch_size: 32
  embedding_dim: 32
  generator_dim: [64, 64]
  discriminator_dim: [64, 64]
  discriminator_steps: 1
  pac: 1
  log_frequency: false
  verbose: true
  cuda: auto
  drop_constant_columns: true
  repair: true
  privacy_filter: true
  privacy_min_distance: 0.0

hybrid:
  model: hybrid
  alpha: 0.5
  alphas: [0.0, 0.25, 0.5, 0.75, 1.0]
  repair: true
  privacy_filter: true
  privacy_min_distance: 0.0

adaptive_extra:
  model: adaptive_extra
  enabled: false
  alpha: 0.5
  group_column:
