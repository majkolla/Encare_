seed: 42
val_frac: 0.2
n_rows_multiplier: 1.0
output_dir: data/outputs
artifact_dir: data/artifacts
models:
  - copula

score_weights:
  marginal: 0.30
  dependency: 0.30
  discriminator: 0.20
  privacy: 0.15
  logic: 0.05

baseline:
  model: baseline
  numeric_strategy: bootstrap
  repair: false
  privacy_filter: false

copula:
  model: copula
  repair: true
  privacy_filter: true
  privacy_min_distance: 0.0
