model: ctgan
models:
  - ctgan

ctgan:
  model: ctgan
  epochs: 100
  batch_size: 32
  embedding_dim: 32
  generator_dim: [64, 64]
  discriminator_dim: [64, 64]
  discriminator_steps: 1
  pac: 1
  log_frequency: false
  verbose: true
  cuda: auto
  drop_constant_columns: true
  repair: true
  privacy_filter: true
  privacy_min_distance: 0.0
