model: ctgan
models:
  - ctgan

ctgan:
  model: ctgan
  epochs: 20
  batch_size: 16
  embedding_dim: 16
  generator_dim: [32, 32]
  discriminator_dim: [32, 32]
  discriminator_steps: 1
  pac: 1
  log_frequency: false
  verbose: true
  cuda: auto
  drop_constant_columns: true
  max_training_rows: 2000
  snap_numeric_max_unique: 32
  repair: true
  privacy_filter: true
  privacy_min_distance: 0.0
